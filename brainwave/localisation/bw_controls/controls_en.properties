Control.riskInfo.ACC04=User accounts with a password that never expires present a risk because once a password is shared, it can spread rapidly, exposing the assets of the company.
Control.suggestedMitigation.ACC08=Contact the account owner to investigate. Check account security (password strength) and enable MFA, if needed.
