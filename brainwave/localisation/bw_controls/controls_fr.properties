Control.riskInfo.QA04=Les organisations dont le responsable est parti vont voir leur surveillance et leur niveau de s\u00E9curit\u00E9 d\u00E9cro\u00EEtre. Elles vont \u00EAtre exclues des proc\u00E9dures de revues, certifications et du contr\u00F4le permanent des responsables. Les risques de fraudes ou de fuites de donn\u00E9es/compromissions sont donc accrus sur les identit\u00E9s, allocations de droits par ex.
