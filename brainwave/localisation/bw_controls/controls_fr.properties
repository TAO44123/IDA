Control.suggestedMitigation.ACC04=R\u00E9activer l'expiration du mot de passe
Control.suggestedMitigation.ACC05=Modifier r\u00E9guli\u00E8rement le mot de passe ou utiliser une solution de gestion des acc\u00E8s \u00E0 privil\u00E8ges (PAM) afin de ne pas divulguer les mots de passe aux utilisateurs
Control.riskInfo.ACC02=Les comptes orphelins sont ni r\u00E9concili\u00E9s \u00E0 une identit\u00E9, ni identifi\u00E9s et surveill\u00E9s comme un compte technique/compte de service. Ils peuvent \u00EAtre utilis\u00E9s et d\u00E9tourn\u00E9s par des personnes mal intentionn\u00E9es afin de perp\u00E9trer des fraudes ou exfiltrer des informations et donn\u00E9es par exemple
Control.suggestedMitigation.ACC06=R\u00E9concilier le compte au travers du portail Brainwave et r\u00E9activer l'expiration du mot de passe ou d\u00E9sactiver le compte
Control.riskInfo.ACC01=Les comptes non utilis\u00E9s ne sont plus surveill\u00E9s par leurs propri\u00E9taires respectifs. Ces comptes peuvent \u00EAtre d\u00E9tourn\u00E9s et utilis\u00E9s par un individu pour r\u00E9aliser une fraude ou malversation. Les comptes peuvent \u00EAtre inutilis\u00E9s lorsque le propri\u00E9taire du compte n'utilise plus le service, si le propri\u00E9taire du compte est un sous-traitant ayant quitt\u00E9 la soci\u00E9t\u00E9 ou si le compte est un compte technique/de test est qu'il n'est plus utilis\u00E9 par exemple.
Control.suggestedMitigation.ACC07=Pour les comptes utilisateur, v\u00E9rifier que le compte est toujours utilis\u00E9, dans le cas contraire le d\u00E9sactiver. R\u00E9activer le renouvellement des mots de passe dans l'application ou le syst\u00E8me
Control.riskInfo.ACC04=Les comptes utilisateurs dont le mot de passe n'expire jamais pr\u00E9sentent un risque car d\u00E8s que le mot de passe est partag\u00E9 ou r\u00E9v\u00E9l\u00E9, il est g\u00E9n\u00E9ralement diffus\u00E9 et expose la soci\u00E9t\u00E9 et ses actifs \u00E0 une utilisation d\u00E9tourn\u00E9e/malintentionn\u00E9e
Control.suggestedMitigation.ACC08=Contacter le propri\u00E9taire du compte pour \u00E9tudier l'anomalie, v\u00E9rifier la s\u00E9curit\u00E9 du compte (force du mot de passe), activer le MFA si besoin.
Control.riskInfo.ACC03=Les comptes doivent \u00EAtre d\u00E9sactiv\u00E9s au d\u00E9part de leur propri\u00E9taire, dans le cas contraire ils  peuvent \u00EAtre utilis\u00E9s et d\u00E9tourn\u00E9s par des personnes mal intentionn\u00E9es afin de perp\u00E9trer des fraudes ou exfiltrer des informations et donn\u00E9es par exemple 
Control.suggestedMitigation.ACC09=R\u00E9activer l'authentification pour ce compte
Control.riskInfo.ACC06=Les comptes orphelins dont le mot de passe n'expire jamais pr\u00E9sentent un risque \u00E9lev\u00E9 car ils ne disposent pas de propri\u00E9taires et d\u00E8s que le mot de passe est partag\u00E9 ou r\u00E9v\u00E9l\u00E9, il est g\u00E9n\u00E9ralement diffus\u00E9 et expose la soci\u00E9t\u00E9 et ses actifs \u00E0 une utilisation d\u00E9tourn\u00E9e/malintentionn\u00E9e
