Control.riskInfo.ACC28=Les comptes utilisateurs r\u00E9activ\u00E9s doivent \u00EAtre v\u00E9rifi\u00E9s car ils peuvent \u00EAtre utilis\u00E9s par une personne mal intentionn\u00E9e pour prendre le contr\u00F4le de certains syst\u00E8mes si ces comptes ont encore des autorisations. En outre, l'identit\u00E9 est marqu\u00E9e comme inactive, ce qui signifie que le propri\u00E9taire du compte ne fait plus partie de l'entreprise.
Control.riskInfo.ACC27=Les comptes utilisateurs r\u00E9activ\u00E9s doivent \u00EAtre v\u00E9rifi\u00E9s car ils peuvent \u00EAtre utilis\u00E9s par une personne mal intentionn\u00E9e pour prendre le contr\u00F4le de certains syst\u00E8mes si ces comptes ont encore des autorisations.
Control.riskInfo.ACC29=Les comptes utilisateurs r\u00E9activ\u00E9s dont le propri\u00E9taire du compte est marqu\u00E9 comme ne faisant plus partie de l'entreprise doivent \u00EAtre v\u00E9rifi\u00E9s car ils peuvent \u00EAtre utilis\u00E9s par une personne mal intentionn\u00E9e pour prendre le contr\u00F4le de certains syst\u00E8mes si ces comptes ont encore des autorisations.
