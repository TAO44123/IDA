Control.riskInfo.ACC13=Lorsque les informations d'un compte et celles du propri\u00E9taire ne co\u00EFncident pas il peut s'agir d'un probl\u00E8me de qualit\u00E9 ou d'une r\u00E9assignation (r\u00E9utilisation/r\u00E9affectation) d'un compte. En cas de r\u00E9assignation, les permissions du compte doivent \u00EAtre revues afin d'\u00EAtre align\u00E9es en regard du principe de moindre privil\u00E8ge
Control.riskInfo.ACC12=Les comptes doivent disposer d'informations d'identification comme un nom, pr\u00E9nom, nom complet, email, nom du propri\u00E9taire afin de simplifier la revue et l'audit des syst\u00E8mes. Il est important de respecter la r\u00E9glementation en vigueur concernant les donn\u00E9es personnelles (PII)
Control.riskInfo.ACC15=Les comptes disposant de droits d'acc\u00E8s "extr\u00EAmement sensibles" doivent \u00EAtre surveill\u00E9s avec soins
Control.riskInfo.ACC14=Les comptes techniques/comptes de service ne disposent pas de propri\u00E9taire de compte. Ces comptes portent toutefois des droits d'acc\u00E8s sensibles et doivent disposer d'un manager de compte (propri\u00E9taire m\u00E9tier) qui sera responsable des revues de compte et permissions sur une fr\u00E9quence r\u00E9guli\u00E8re
Control.riskInfo.ACC17=La surallocation de droits d'acc\u00E8s r\u00E9sulte de droits accord\u00E9s en dehors d'une proc\u00E9dure formalis\u00E9e, avec ou sans validation. G\u00E9n\u00E9ralement il s'agit de droits qui ont \u00E9t\u00E9 octroy\u00E9s par erreur, par demande directe (hors syst\u00E8me) ou parfois la r\u00E9sultante de mises \u00E0 jour syst\u00E8me. Ces droits d'acc\u00E8s n'ayant pas \u00E9t\u00E9 approuv\u00E9s ils peuvent pr\u00E9senter des risques et mener \u00E0 des fraudes ou des fuites de donn\u00E9es.
Control.riskInfo.ACC16=Les comptes disposant de droits d'acc\u00E8s "hautement sensibles" doivent \u00EAtre surveill\u00E9s avec soins
Control.riskInfo.ACC19=L'attribution de nouveaux droits d'acc\u00E8s atypiques doit \u00EAtre monitor\u00E9e car ils repr\u00E9sentent des \u00E9carts, une incoh\u00E9rence en regard du contexte organisationnel (droit d'acc\u00E8s non identifi\u00E9 pour le reste de l'\u00E9quipe, pour les m\u00E9tiers par ex.). Ils peuvent \u00EAtre le r\u00E9sultat d'une erreur des op\u00E9rations informatiques ou un droit qui a \u00E9t\u00E9 attribu\u00E9 de mani\u00E8re ill\u00E9gitime/discr\u00E9tionnaire (hors proc\u00E9dure/validation formelle).
