Control.riskInfo.REM01=Un \u00E9cart est constat\u00E9 entre le statut de la correction/rem\u00E9diation demand\u00E9e (par ex. d\u00E9sactivation du compte r\u00E9alis\u00E9e) et la situation remont\u00E9e par les syst\u00E8mes (par ex. compte toujours actif). Le compte peut donc encore \u00EAtre utilis\u00E9 dans des malversations tout en \u00E9tant consid\u00E9r\u00E9 comme d\u00E9sactiv\u00E9 par le demandeur de la correction (manager, propri\u00E9taire par ex.) augmentant ainsi les risques
Control.riskInfo.REM04=Un \u00E9cart est constat\u00E9 entre l'\u00E9tat de la correction/rem\u00E9diation demand\u00E9e (par ex. d\u00E9sactivation de l'identit\u00E9 r\u00E9alis\u00E9e) et la situation remont\u00E9e par les syst\u00E8mes (par ex. identit\u00E9 toujours active). L'identit\u00E9 peut donc encore \u00EAtre utilis\u00E9e dans des malversations tout en \u00E9tant consid\u00E9r\u00E9e comme d\u00E9sactiv\u00E9e par le demandeur de la correction (manager, propri\u00E9taire par ex.) augmentant ainsi les risques
Control.riskInfo.REM02=Un \u00E9cart est constat\u00E9 entre le statut de la correction/rem\u00E9diation demand\u00E9e (par ex. suppression du droit d'acc\u00E8s r\u00E9alis\u00E9e) et la situation remont\u00E9e par les syst\u00E8mes (par ex. droit d'acc\u00E8s toujours allou\u00E9). Le droit d'acc\u00E8s peut donc encore \u00EAtre utilis\u00E9 dans des malversations tout en \u00E9tant consid\u00E9r\u00E9 comme r\u00E9voqu\u00E9 par le demandeur de la correction (manager, propri\u00E9taire par ex.) augmentant ainsi les risques
Control.riskInfo.REM03=Un \u00E9cart est constat\u00E9 entre l'\u00E9tat de la correction/rem\u00E9diation demand\u00E9e (par ex. suppression d'un droit d'acc\u00E8s sur un dossier r\u00E9alis\u00E9e) et la situation remont\u00E9e par les syst\u00E8mes (par ex. droit sur le r\u00E9pertoire toujours allou\u00E9). Le droit sur le r\u00E9pertoire peut donc encore \u00EAtre utilis\u00E9 dans des malversations tout en \u00E9tant consid\u00E9r\u00E9 comme r\u00E9voqu\u00E9 par le demandeur de la correction (manager, propri\u00E9taire par ex.) augmentant ainsi les risques
