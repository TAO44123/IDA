Control.riskInfo.QA07=Une organisation orpheline est une partie de l'organisation (un noeud) qui n'est rattach\u00E9e \u00E0 aucune partie de l'organisation principale. Elle peut \u00EAtre le r\u00E9sultat d'un probl\u00E8me de qualit\u00E9 de donn\u00E9es dans le/les syst\u00E8mes source repr\u00E9sentant l'organisation (organisation r\u00E9siduelle sans parent suite \u00E0 une r\u00E9organisation par exemple)
Control.riskInfo.QA08=Une organisation vide est une organisation (un noeud) qui ne dispose d'aucune identit\u00E9 rattach\u00E9e. L'organisation peut-\u00EAtre vide pour des raisons de qualit\u00E9 de donn\u00E9es dans le/les syst\u00E8mes source repr\u00E9sentant l'organisation (difficult\u00E9 de corr\u00E9lation sur les noms des organisations, erreurs dans les identifiants des organisations). En cas de r\u00E9organisation, ne organisation vide peut \u00E9galement \u00EAtre une organisation en pr\u00E9paration ou une ancienne organisation qui n'a pas encore \u00E9t\u00E9 supprim\u00E9e.
