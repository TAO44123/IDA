<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<script src="bw_pages.js"></script>
	<script src="echarts.min.js"></script>
	<title>Parallel Set Chart</title>
	<style>
		.dimension {
			cursor: ns-resize;
		}

		.category {
			cursor: ew-resize;
		}

		.dimension tspan.name {
			font-size: 1.5em;
			fill: #333;
			font-weight: bold;
		}

		.dimension tspan.sort {
			fill: #000;
			cursor: pointer;
			opacity: 0;
		}

		.dimension tspan.sort:hover {
			fill: #333;
		}

		.dimension:hover tspan.name {
			fill: #000;
		}

		.dimension:hover tspan.sort {
			opacity: 1;
		}

		.dimension line {
			stroke: #000;
		}

		.dimension rect {
			stroke: none;
			fill-opacity: 0;
		}

		.dimension>rect,
		.category-background {
			fill: #fff;
		}

		.dimension>rect {
			display: none;
		}

		.category:hover rect {
			fill-opacity: .3;
		}

		.dimension:hover>rect {
			fill-opacity: .3;
		}

		.ribbon path {
			stroke-opacity: 0;
			fill-opacity: .5;
		}

		.ribbon path.active {
			fill-opacity: .9;
		}

		.ribbon-mouse path {
			fill-opacity: 0;
		}

		.category-0 {
			fill: #1f77b4;
			stroke: #1f77b4;
		}

		.category-1 {
			fill: #ff7f0e;
			stroke: #ff7f0e;
		}

		.category-2 {
			fill: #2ca02c;
			stroke: #2ca02c;
		}

		.category-3 {
			fill: #d62728;
			stroke: #d62728;
		}

		.category-4 {
			fill: #9467bd;
			stroke: #9467bd;
		}

		.category-5 {
			fill: #8c564b;
			stroke: #8c564b;
		}

		.category-6 {
			fill: #e377c2;
			stroke: #e377c2;
		}

		.category-7 {
			fill: #7f7f7f;
			stroke: #7f7f7f;
		}

		.category-8 {
			fill: #bcbd22;
			stroke: #bcbd22;
		}

		.category-9 {
			fill: #17becf;
			stroke: #17becf;
		}

		.tooltip {
			background-color: rgba(242, 242, 242, .6);
			position: absolute;
			padding: 5px;
		}

		body {
			font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
			font-size: 14px;
		}

		.spinner {
			margin: 100px auto 0;
			width: 70px;
			text-align: center;
		}

		.spinner>div {
			width: 18px;
			height: 18px;
			background-color: #333;

			border-radius: 100%;
			display: inline-block;
			-webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
			animation: sk-bouncedelay 1.4s infinite ease-in-out both;
		}

		.spinner .bounce1 {
			-webkit-animation-delay: -0.32s;
			animation-delay: -0.32s;
		}

		.spinner .bounce2 {
			-webkit-animation-delay: -0.16s;
			animation-delay: -0.16s;
		}

		@-webkit-keyframes sk-bouncedelay {

			0%,
			80%,
			100% {
				-webkit-transform: scale(0)
			}

			40% {
				-webkit-transform: scale(1.0)
			}
		}

		@keyframes sk-bouncedelay {

			0%,
			80%,
			100% {
				-webkit-transform: scale(0);
				transform: scale(0);
			}

			40% {
				-webkit-transform: scale(1.0);
				transform: scale(1.0);
			}
		}
	</style>
</head>

<body>
	<div id="loading" class="spinner">
		<div class="bounce1"></div>
		<div class="bounce2"></div>
		<div class="bounce3"></div>
	</div>
	<div id="parallelset" style="width:100%"></div>
</body>

<script>
	document.documentElement.style.overflow = 'hidden';
	document.body.scroll = "no";

	var dimensions = [];
	var rotate = false;

	Pages.listenInit(function (varName, initialValue) {
		if (varName == "dimensions") {
			var val = initialValue;
			dimensions = val.split('|').map(function (e) { return e.trim(); });
		}
		if (varName == "rotate") {
			rotate = initialValue;
		}
	});

	var sets = [];
	var cachedsets = [];
	var div;
	var chart;

	var chartDom;
	var myChart;
	var option;

    function initChart() {
        var chartDiv = document.getElementById('parallelset');

        var width = document.documentElement.clientWidth;
        var height = document.documentElement.clientHeight;

        chartDiv.style.width = width + 'px';
        chartDiv.style.height = height + 'px';

        myChart = echarts.init(chartDiv);
    }

	var skipevent = false;
	buildChart = function (rows) {
		dataChart = [];
		linksChart = [];

		var colors = [
			'#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd',
			'#8c564b', '#e377c2', '#7f7f7f', '#bcbd22', '#17becf'
		];

		if (rows != null) {
			for (index = 0; index < rows.length; index++) {
				for (d = 0; d < dimensions.length; d++) {
					var dim = rows[index]["dim" + d];


					// test if already exist in dataChart
					const existingIndex = dataChart.findIndex(item => item.name === dim);
					if (existingIndex !== -1) {
						dataChart[existingIndex].value += 1;
					} else {
						dataChart.push({
							name: dim,
							value: 1,
							dimension: dimensions[d],
							itemStyle: {
								color : colors[d%8], 
								borderColor: "#000000",
							},
							tooltip: {
								// valueFormatter: (value) =>  value*10 + '%',
								// formatter: '{b} <br> <b>{c}0%</b>'
							}
						});
					}

					if ((d + 1) < dimensions.length) {
						const source = rows[index]["dim" + d];
						const target = rows[index]["dim" + (d + 1)];
						
						const existingLinkIndex = linksChart.findIndex(link => 
							link.source === source && link.target === target
						);
						
						if (existingLinkIndex !== -1) {
							linksChart[existingLinkIndex].value += 1;
						} else {
							linksChart.push({
								source: source,
								target: target,
								value: 1,
								lineStyle : {
									color : colors[d%8],
									opacity: 0.5},
								tooltip: {
									// valueFormatter: (value) =>  value*10 + '%',
									// formatter: "{b} <br> <b> {c} </b>"
								}
							});
						}
					}
				}
			}
		}

		option = {
			tooltip: {
				trigger: 'item',
				triggerOn: 'mousemove'
			},
			emphasis: {
				disabled : false,
				focus : "trajectory",
			},
			animation: false,
			series: [
				{
					type: 'sankey',
					left: '3%',
					top: '2%',
					right: '3%',
					bottom: '2%',
					data: dataChart,
					links: linksChart,
					orient: 'vertical',
					label: {
						position: 'insideLeft'
					},
					lineStyle: {
						color: 'source',
						curveness: 0.5
					}
				}
			]
		};

		option && myChart.setOption(option);

		myChart.on('click', function (params) {
			if (params.dataType === 'node') {
				var selecteddimensionname = params.data.dimension;
				var selectedcategory = params.name;
				var selecteddimensionindex = -1;
				for (var i = 0; i < dimensions.length; i++) {
					if (dimensions[i] === selecteddimensionname) {
						selecteddimensionindex = i;
						break;
					}
				}
				skipevent = true;
				Pages.sendEvent('oncategorydbleclick', {
					dimensionindex: selecteddimensionindex,
					dimension: selecteddimensionname,
					category: selectedcategory
				});
            }
		});

		document.getElementById('loading').style.display = 'none';
	};

	createChart = function () {
		Pages.fetchDataset("chartdata", function (rows) {
			buildChart(rows);
		});
	};

	var myTimeout = null;

	var fetchInvalidated = function () {
		Pages.fetchDataset("chartdata", function (rows) {
			buildChart(rows);
			myTimeout = null;
		});
	};

	Pages.listenToDatasetInvalidation("chartdata", function () {
		if (myTimeout != null) {
			clearTimeout(myTimeout);
			myTimeout = setTimeout(fetchInvalidated, 500);
			return;
		}
		myTimeout = setTimeout(fetchInvalidated, 500);
	});

	Pages.listenInitDone(function () {
		initChart();
		createChart();
	});
</script>

</html>
