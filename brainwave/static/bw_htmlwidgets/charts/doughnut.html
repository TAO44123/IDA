<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Doughnut Chart</title>
  <script src="bw_pages.js"></script>
  <script src="chart.umd.min.js"></script>
  <style>
    html,
    body,
    #canvas-holder {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .spinner {
      margin: 100px auto 0;
      width: 70px;
      text-align: center;
    }

    .spinner>div {
      width: 18px;
      height: 18px;
      background-color: #333;
      border-radius: 100%;
      display: inline-block;
      -webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
      animation: sk-bouncedelay 1.4s infinite ease-in-out both;
    }

    .spinner .bounce1 {
      -webkit-animation-delay: -0.32s;
      animation-delay: -0.32s;
    }

    .spinner .bounce2 {
      -webkit-animation-delay: -0.16s;
      animation-delay: -0.16s;
    }

    @-webkit-keyframes sk-bouncedelay {

      0%,
      80%,
      100% {
        -webkit-transform: scale(0)
      }

      40% {
        -webkit-transform: scale(1.0)
      }
    }

    @keyframes sk-bouncedelay {

      0%,
      80%,
      100% {
        -webkit-transform: scale(0);
        transform: scale(0);
      }

      40% {
        -webkit-transform: scale(1.0);
        transform: scale(1.0);
      }
    }
  </style>
</head>

<body>

  <div id="loading" class="spinner">
    <div class="bounce1"></div>
    <div class="bounce2"></div>
    <div class="bounce3"></div>
  </div>

  <div id="canvas-holder" style="width:100%">
    <canvas id="chart-area"></canvas>
  </div>

  <script>
    document.documentElement.style.overflow = 'hidden';
    document.body.scroll = "no";

    var legendTitle = '';
    var tooltipShowPercent = false;
    var showTitle = false;
    var showLegend = true;
    var legendPosition = 'right';
    var titlePosition = 'top';
    var titleFontSize = 12;
    var nbmaxelements = 0;
    var showOther = true;
    var backgroundcolor = '#FFFFFF';
    var othercolor = '#999999';
    var othercode = 'others';
    var otherlabel = 'Others';
    var customColors = null;
    var rotation = 0;
    var circumference = 360;
    var cutout = '50%';
    var defaultColors = [
      "#61bd6d",
      "#54acd2",
      "#9365b8",
      "#553982",
      "#eb6b56",
      "#75706b",
      "#f37934",
      "#475577",
      "#d1d5d8",
      "#2969b0"
    ];

    Pages.listenInit(function (varName, initialValue) {
      if (varName == "title") {
        legendTitle = initialValue;
        showTitle = true;
      }
      if (varName == "titlePosition") {
        titlePosition = initialValue;
      }
      if (varName == "titleFontSize") {
        titleFontSize = initialValue;
      }
      if (varName == "showLegend") {
        showLegend = initialValue;
      }
      if (varName == "legendPosition") {
        legendPosition = initialValue;
      }
      if (varName == "tooltipShowPercent") {
        tooltipShowPercent = initialValue;
      }
      if (varName == "nbMaxElements") {
        nbmaxelements = initialValue;
      }
      if (varName == "showHalfOnly") {
        if (initialValue) {
          rotation = 270;
          circumference = 180;
        }
        else {
          rotation = 180;
          circumference = 360;
        }
      }
      if (varName == "cutoutPercentage") {
        cutout = initialValue + '%';
      }
      if (varName == "showOther") {
        showOther = initialValue;
      }
      if (varName == "otherColor") {
        othercolor = initialValue;
      }
      if (varName == "otherCode") {
        othercode = initialValue;
      }
      if (varName == "otherLabel") {
        otherlabel = initialValue;
      }
      if (varName == "customColors") {
        var colors = initialValue.split(',');
        defaultColors = colors.slice(0);
      }
      if (varName == "backgroundColor") {
        backgroundcolor = initialValue;
      }
    });

    var newLegendClickHandler = function (e, legendItem) {
      var index = legendItem.index;
      var code = window.myDoughnut.data.codes[index];
      var label = window.myDoughnut.data.labels[index];
      Pages.sendEvent('onlegendclick', { code: code, label: label });
    };

    createChart = function () {
      var mydata = [];
      var mylabels = [];
      var mycodes = [];

      var options = {
        responsive: true,
        maintainAspectRatio: false,
        rotation: rotation,
        circumference: circumference,
        cutout: cutout,
        onHover: function (event, chartElement) {
          var point = this.getElementsAtEventForMode(event.native, 'nearest', { intersect: true }, false);
          if (point.length) event.native.target.style.cursor = 'pointer';
          else event.native.target.style.cursor = 'default';
        },
        plugins: {
          legend: {
            position: legendPosition,
            onClick: newLegendClickHandler,
            reverse: false,
            display: showLegend,
            onHover: function (event) {
              event.native.target.style.cursor = 'pointer';
            }
          },
          title: {
            display: showTitle,
            text: legendTitle,
            position: titlePosition,
            font: {
              size: titleFontSize
            }
          },
          tooltip: {
            callbacks: {
              title: function (context) { return ''; },
              label: function (context) {
                const dataset = context.dataset;
                const data = dataset.data;
                const total = data.reduce((accum, current) => Number(accum) + Number(current), 0);
                const currentValue = data[context.dataIndex];
                var label = '0';
                if (context.label != '') {
                  label = context.label;
                }
                return label + ": " + currentValue + (tooltipShowPercent ? (" (" + ((currentValue / total) * 100).toFixed(2) + "%)") : '');
              },
            }
          }
        },
        animation: {
          animateScale: true,
          animateRotate: true
        }
      };

      Pages.fetchDataset("chartdata", function (rows) {
        var customColors = [];
        var othervalue = 0;
        for (index = 0; index < rows.length; index++) {
          if (nbmaxelements > 0) {
            if (index >= nbmaxelements) {
              if (showOther) {
                othervalue = othervalue + rows[index]["count"];
              }
              continue;
            }
          }
          mydata.push(rows[index]["count"]);
          mylabels.push(rows[index]["label"]);
          mycodes.push(rows[index]["code"]);
          var /*String*/ color = rows[index]["color"];
          if (color != null && color.indexOf('#') == 0 && color.length == 7)
            customColors.push(color);
          else
            customColors.push(defaultColors[index % defaultColors.length]);
        }

        if (othervalue > 0) {
          mydata.push(othervalue);
          mylabels.push(otherlabel);
          mycodes.push(othercode);
          customColors.push(othercolor);
        }

        var data = {
          datasets: [{
            data: mydata,
            backgroundColor: customColors
          }],
          labels: mylabels,
          codes: mycodes
        };

        var ctx = document.getElementById('chart-area').getContext('2d');
        document.getElementById('loading').style.display = 'none';

        var plugin = {
          id: 'custom_canvas_background_color',
          beforeDraw: (chart) => {
            const ctx = chart.canvas.getContext('2d');
            ctx.save();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = backgroundcolor;
            ctx.fillRect(0, 0, chart.width, chart.height);
            ctx.restore();
          }
        };

        var config = {
          type: 'doughnut',
          data: data,
          options: options,
          plugins: [plugin]
        };

        window.myDoughnut = new Chart(ctx, config);

        document.getElementById("chart-area").onclick = function (evt) {
          var activePoints = window.myDoughnut.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
          var firstPoint = activePoints[0];
          var label = window.myDoughnut.data.labels[firstPoint.index];
          var value = window.myDoughnut.data.datasets[firstPoint.datasetIndex].data[firstPoint.index];
          var code = window.myDoughnut.data.codes[firstPoint.index];
          Pages.sendEvent('onclick', { code: code, label: label, count: value });
        };
      });
    };

    var myTimeout = null;

    var fetchInvalidated = function () {
      window.myDoughnut.data.codes = [];
      window.myDoughnut.data.labels = [];
      window.myDoughnut.data.datasets[0].data = [];
      window.myDoughnut.data.datasets[0].backgroundColor = [];

      Pages.fetchDataset("chartdata", function (rows) {
        var customColors = [];
        var othervalue = 0;
        for (index = 0; index < rows.length; index++) {
          if (nbmaxelements > 0) {
            if (index >= nbmaxelements) {
              if (showOther) {
                othervalue = othervalue + rows[index]["count"];
              }
              continue;
            }
          }
          window.myDoughnut.data.datasets[0].data.push(rows[index]["count"]);
          window.myDoughnut.data.labels.push(rows[index]["label"]);
          window.myDoughnut.data.codes.push(rows[index]["code"]);

          var color = rows[index]["color"];
          if (color != null && color.indexOf('#') == 0 && color.length == 7)
            window.myDoughnut.data.datasets[0].backgroundColor.push(color);
          else
            window.myDoughnut.data.datasets[0].backgroundColor.push(defaultColors[index % defaultColors.length]);
        }

        if (othervalue > 0) {
          window.myDoughnut.data.datasets[0].data.push(othervalue);
          window.myDoughnut.data.labels.push(otherlabel);
          window.myDoughnut.data.codes.push(othercode);
          window.myDoughnut.data.datasets[0].backgroundColor.push(othercolor);
        }

        window.myDoughnut.update();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('canvas-holder').style.display = 'block';
        myTimeout = null;
      });
    };

    Pages.listenToDatasetInvalidation("chartdata", function () {
      if (myTimeout != null) {
        clearTimeout(myTimeout);
        myTimeout = setTimeout(fetchInvalidated, 500);
        return;
      }
      myTimeout = setTimeout(fetchInvalidated, 500);
    });

    Pages.listenInitDone(function () {
      createChart();
    });
  </script>
</body>

</html>
