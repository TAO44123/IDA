<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Radar Chart</title>
  <script src="bw_pages.js"></script>
  <script src="chart.umd.min.js"></script>
  <style>
   html,body,#canvas-holder {
  		height: 100%;
  		width: 100%
  	}
  
	.spinner {
	  margin: 100px auto 0;
	  width: 70px;
	  text-align: center;
	}

	.spinner > div {
	  width: 18px;
	  height: 18px;
	  background-color: #333;

	  border-radius: 100%;
	  display: inline-block;
	  -webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
	  animation: sk-bouncedelay 1.4s infinite ease-in-out both;
	}

	.spinner .bounce1 {
	  -webkit-animation-delay: -0.32s;
	  animation-delay: -0.32s;
	}

	.spinner .bounce2 {
	  -webkit-animation-delay: -0.16s;
	  animation-delay: -0.16s;
	}

	@-webkit-keyframes sk-bouncedelay {
	  0%, 80%, 100% { -webkit-transform: scale(0) }
	  40% { -webkit-transform: scale(1.0) }
	}

	@keyframes sk-bouncedelay {
	  0%, 80%, 100% { 
		-webkit-transform: scale(0);
		transform: scale(0);
	  } 40% { 
		-webkit-transform: scale(1.0);
		transform: scale(1.0);
	  }
	}
  </style>
</head>

<body>

<div id="loading" class="spinner">
  <div class="bounce1"></div>
  <div class="bounce2"></div>
  <div class="bounce3"></div>
</div>

<div id="canvas-holder" style="width:100%">
	<canvas id="chart-area"></canvas>
</div>

<script>	
	document.documentElement.style.overflow = 'hidden';
	document.body.scroll = "no"; 
	
	var legendTitle = '';
	var showTitle = false;
	var titlePosition = 'top';
	var titleFontSize = 12;
	var tooltipPrefix = '';
	var tooltipSuffix = '';
	var tooltipShowPercent = false;
	var backgroundColor= 'rgba(12, 113, 195, 0.5)';
	var fill= 'false';
	var beginAtZero = true;
	var showAxesGrid = true;
	var showCircularGrid = false;
	var lineTension= 0;
	var pointRadius= 4;
	var borderColor= 'rgba(12, 113, 195, 0.9)';
	var borderWidth = 2;
	var pointStyle = 'circle';
	var pointBackgroundColor= 'rgba(12, 113, 195, 1.0)';
	var pointBorderColor= 'rgba(12, 113, 195, 1.0)';
	var pointHoverRadius= pointRadius*1.2;
	var pointHoverBackgroundColor= 'rgba(12, 113, 195, 1.0)';
	var pointHoverBorderColor= 'rgba(12, 113, 195, 1.0)';
	
	Pages.listenInit(function(varName, initialValue) {
		if ( varName == "title" ){
			legendTitle = initialValue;
			showTitle = true;
		}
		if ( varName == "titlePosition" ){
			titlePosition = initialValue;
		}
		if ( varName == "titleFontSize" ){
			titleFontSize = initialValue;
		}
		if ( varName == "tooltipPrefix" ){
			tooltipPrefix = initialValue;
		}
		if ( varName == "tooltipSuffix" ){
			tooltipSuffix = initialValue;
		}
		if ( varName == "tooltipShowPercent" ){
			tooltipShowPercent= initialValue;
		}
		if ( varName == "fill" ){
			fill= initialValue;
		}
		if( varName == 'beginAtZero') {
			beginAtZero = initialValue;
		}
		if ( varName == "showAxesGrid" ){
			showAxesGrid= initialValue;
		}
		if ( varName == "showCircularGrid" ){
			showCircularGrid= initialValue;
		}
		if ( varName == "pointStyle" ){
			pointStyle = initialValue;
		}
		if ( varName == "pointRadius" ){
			pointRadius = initialValue;
			pointHoverRadius = initialValue*1.2;
		}
		if ( varName == "lineColor" ){
			borderColor = initialValue;
		}
		if ( varName == "lineWidth" ){
			borderWidth = initialValue;
		}
		if ( varName == "pointColor" ){
			pointBackgroundColor = initialValue;
			pointBorderColor = initialValue;
		}
		if ( varName == "pointHoverColor" ){
			pointHoverBackgroundColor = initialValue;
			pointHoverBorderColor = initialValue;
		}
		if ( varName == "fillColor" ){
			backgroundColor = initialValue;
		}
	});
			
	var newLegendClickHandler = function (e, legendItem) {
		var index = legendItem.index;
		var code  = window.myDoughnut.data.codes[index];
		var label = window.myDoughnut.data.labels[index];
		Pages.sendEvent('onlegendclick', {code: code, label: label});
	};
		
	
	
	createChart = function () {
		var mydata = [];
		var mylabels = [];
		var mycodes = [];
		
		var options = {
			responsive: true,
			maintainAspectRatio: false,
			onHover: function (event, chartElement) {
				var point = this.getElementsAtEventForMode(event.native, 'nearest', { intersect: true }, false);
				if (point.length) event.native.target.style.cursor = 'pointer';
				else event.native.target.style.cursor = 'default';
			},
			plugins: {
				legend: {
					position: 'right',
					onClick: newLegendClickHandler,
					reverse: false,
					display: false,
					onHover: function (event) {
						event.native.target.style.cursor = 'pointer';
					}
				},
				title: {
					display: showTitle,
					text: legendTitle,
					position: titlePosition,
					font: {
						size: titleFontSize
					}
				},
				tooltip: {
					callbacks: {
						label: function (context) {
							var dataset = context.dataset;
							var pTotal = dataset.data.reduce(function (acum, current) { return Number(acum) + Number(current); });
							var pCurrent = dataset.data[context.dataIndex];
							return (tooltipPrefix + ' ' + pCurrent + (tooltipShowPercent ? (" (" + ((pCurrent / pTotal) * 100).toFixed(2) + "%)") : ''));
						}
					}
				}
			},
			scales: {
				r: {
					grid: {
						display: showAxesGrid,
						circular: showCircularGrid
					},
					beginAtZero: beginAtZero
				}
			},
			animation: {
				animateScale: true,
				animateRotate: true
			},
		};
	
		Pages.fetchDataset("chartdata", function(rows) {
			
			for (index = 0; index < rows.length; index++) {
				mydata.push   (rows[index]["count"]);
				mylabels.push (rows[index]["label"]);
				mycodes.push (rows[index]["code"]);
			}
			
			var data = { 
				datasets:[{
					data:mydata,
					backgroundColor: backgroundColor,
					fill: fill=='end' ? true : false,
					lineTension: lineTension,
					pointRadius: pointRadius,
					pointBackgroundColor: pointBackgroundColor,
					pointBorderColor: pointBorderColor,
					pointHoverRadius: pointHoverRadius,
					pointHoverBackgroundColor: pointHoverBackgroundColor,
					pointHoverBorderColor: pointHoverBorderColor,
					borderColor: borderColor,
					borderWidth: borderWidth,
					pointStyle: pointStyle
					
				}], 
				labels:mylabels,
				codes:mycodes
			};

			var ctx = document.getElementById('chart-area').getContext('2d');
			document.getElementById('loading').style.display = 'none';
			window.myDoughnut = new Chart(ctx, {
				type: 'radar',
				data: data,
				options: options
			});

			document.getElementById("chart-area").onclick = function (evt) {
				var activePoints = window.myDoughnut.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
				var firstPoint = activePoints[0];
				var label = window.myDoughnut.data.labels[firstPoint.index];
				var value = window.myDoughnut.data.datasets[firstPoint.datasetIndex].data[firstPoint.index];
				var code = window.myDoughnut.data.codes[firstPoint.index];
				Pages.sendEvent('onclick', { code: code, label: label, count: value });
			};
			
		});
	};
	
	var myTimeout = null;
	
	var fetchInvalidated = function () {
		
		window.myDoughnut.data.codes = [];
		window.myDoughnut.data.labels = [];
		window.myDoughnut.data.datasets[0].data = [];
		
		Pages.fetchDataset("chartdata", function(rows) {		
			for (index = 0; index < rows.length; index++) {
				window.myDoughnut.data.datasets[0].data.push (  rows[index]["count"] );
				window.myDoughnut.data.labels.push ( rows[index]["label"] );
				window.myDoughnut.data.codes.push ( rows[index]["code"] );
			}
			window.myDoughnut.update();
			document.getElementById('loading').style.display = 'none';
			document.getElementById('canvas-holder').style.display = 'block';
			myTimeout = null;
		});
	};
	
	Pages.listenToDatasetInvalidation("chartdata", function() {
		if ( myTimeout!=null ){
			clearTimeout( myTimeout );
			myTimeout = setTimeout ( fetchInvalidated, 500 );
			return;
		}
//		document.getElementById('loading').style.display = 'block';
//		document.getElementById('canvas-holder').style.display = 'none';
		myTimeout = setTimeout ( fetchInvalidated, 500 );
	});
	
	Pages.listenInitDone(function() {
		createChart();
	});
  </script>
</body>
</html>
