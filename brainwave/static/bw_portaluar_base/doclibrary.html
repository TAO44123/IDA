  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Documentation</title>
      <script src="bw_pages.js"></script>
 	<script>	
 	var title = '';
 	var url = '';
 	
	Pages.listenInit(function(varName, initialValue) {
		if ( varName == "title" ){
			title = initialValue;
		}
		if ( varName == "url" ){
			url = initialValue;
		}
	});
	
	Pages.listenInitDone(function() {
		window.location.replace(url);
	});
  </script>
    </head>
