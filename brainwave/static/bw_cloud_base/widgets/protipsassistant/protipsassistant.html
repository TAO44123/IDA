<!doctype html>

<html>
<head>
	<meta charset="utf-8">
	<title>Protips Assistant</title>
	<script src="bw_pages.js"></script>
	<script src="jquery.slim.min.js"></script>
	<script src="materialize.min.js"></script>
	<script>
		// keep a reference to the assistant div
		var assistant;
		
		clickOnMore = function ( ) {
			Pages.sendEvent('onClickMore', {code: this["data"]["code"] });
		};
		
		clickOnDiscard = function ( ) {
			Pages.sendEvent('onClickDiscard', {code: this["data"]["code"] });
			assistant.find ( ".li_" + this["data"]["code"] ).hide();
		};
		
		clickOnRead = function ( event ) {
			if ( $(this).css('font-weight').toLowerCase() != 'normal' && $(this).css('font-weight') != 400 ) {
				$(this).css("font-weight","Normal");
				Pages.sendEvent('onClickRead', {code: event.data["code"] });
			}
		};
		
		clickOnRating = function ( ) {
			var rcode = $(this).attr("data-tooltip-code");
			var rvalue = $(this).attr("data-tooltip-value");
			Pages.sendEvent('onClickRating', {code: rcode, rating: rvalue });
			var currentRating = Number(rvalue);
			assistant.find ( "." + rcode ).each(function(x){
				if ( $(this).hasClass ("ratingitem") ) {
					if ( Number ($(this).attr("data-tooltip-value")) == currentRating ) {
						$(this).addClass('full');
					}
					else {
						$(this).removeClass('full');
					}
				}
				else {
					if ( Number ($(this).attr("data-tooltip-value")) == currentRating ) {
						$(this).addClass('simpleriskdark');
					}
					else {
						$(this).removeClass('simpleriskdark');
					}
				}
			});
								
		};
		
		// Get NLS from fragment
		Pages.listenInit(function(varName, initialValue) {
			if ( varName == "label_hide" ){
				assistant.find('.btn-flat').html( initialValue + "<i class='material-icons'>keyboard_arrow_right</i>");
			}
			if ( varName == "label_showmore" ){
				assistant.find('.linkmore').text( initialValue );
			}
			if ( varName == "label_protip_discard" ){
				assistant.find('.linkdiscard').text( initialValue );
			}
			if ( varName == "label_simplerisk_ok" ){
				assistant.find('.sprk1').attr( "data-tooltip", initialValue );
			}
			if ( varName == "label_simplerisk_notok" ){
				assistant.find('.sprk0').attr( "data-tooltip", initialValue );
			}
		});
		
		$( document ).ready(function() {
		    
		    // Find iframe
		    var assistantiframeparents = $("iframe[src$='protipsassistant.html']", parent.document);
		    
		    // Move div outsite the iframe
		    assistant = $("#protipassistant");
		    assistant.detach();
		    
		    // Search for good parent
		    assistantiframeparents.parents().each(function(){
		    	if ( $(this).attr('data-rwtcss') == 'page-area-wrapper' ) {
		    		assistant.appendTo ( $(this).children().last().last() );
		    	}
		    });
		    
		    
		    // Modify main css and hide by default
			assistant = $('#protipassistant', parent.document);
			assistant.css('background-color', 'white');
			assistant.css('position', 'absolute');
			assistant.css('right', '0');
			assistant.css('bottom', '0');
			assistant.css('top', '1px');
			assistant.css('width', '25em');
			assistant.css('height', '100%' );
			assistant.css('z-index', 999999);
			assistant.find ( "#templates").hide();
			assistant.hide()
			
			// Catch clicks on hide button
			assistant.find("#hide").click(function(){
				assistant.hide();
				Pages.sendChange ("showassistant", false);
				Pages.sendEvent('onHide');
			});
			
			// Init materialize
			if ( navigator.userAgent.match(/Chrome\//i) || navigator.userAgent.match(/Edg\//i) ) {
				assistant.find('.collapsible').collapsible(  );
			}
			else {
				assistant.find('.collapsible').collapsible( {inDuration:0} );
			}
				
			
		});
		
		// Show assistant when variable is set to true
		Pages.listenTo("showassistant", function(newValue) {
			if ( newValue == true ) {
				
				// Start loading
				assistant.find(".loading").show();
				assistant.show();
				
				// fetch items to display
				var template;
				assistant.find(".allitems").children().remove();
				
				// Read the dataset from Pages
				Pages.fetchDataset("itemstodisplay", function(rows) {
					for (index = 0; index < rows.length; index++) {
						
						if (rows[index]["code"].startsWith("PR") ) {
							template = assistant.find(".protipsbase");
							template = template.clone().removeClass("protipsbase");
							template.removeClass("template");
							template.addClass ( "li_" + rows[index]["code"] );
							template.find (".protip-title").append(rows[index]["title"]);
							template.find (".protip-description").text(rows[index]["description"]);
							
							template.find(".protip-title").click(rows[index], clickOnRead );
							
							if (rows[index]["status"]==null || rows[index]["status"]==""){
								template.find(".protip-title").css("font-weight","Bold");
							}
							if ( ! rows[index]["code"].endsWith ("_goto") ){
								template.find(".linkmore").remove();
							}
							else {
								template.find(".linkmore").click($.proxy (clickOnMore,  {'data':rows[index]} ) );
							}
							template.find(".linkdiscard").click($.proxy (clickOnDiscard,  {'data':rows[index]} ) );
							assistant.find(".allitems").append(template);
						}
						
						if (rows[index]["code"].startsWith("RK") ) {
							template = assistant.find(".riskbase");
							template = template.clone().removeClass("riskbase");
							template.removeClass("template");
							template.find (".risk-title").append(rows[index]["title"]);
							template.find (".risk-description").text(rows[index]["description"]);
							
							template.find (".risk-title").click(rows[index], clickOnRead );
							
							if ( rows[index]["riskinfo3"] == null || rows[index]["riskinfo3"] == "" ){
								// Using simple risk
								template.find (".sprk0").attr( "data-tooltip-code", rows[index]["code"] );
								template.find (".sprk1").attr( "data-tooltip-code", rows[index]["code"] );
								
								template.find (".riskrating").remove();
								
								if ( !(rows[index]["riskrating"]==null || rows[index]["riskrating"]=="" ) ){
									template.find(".simpleriskrating").each(function(){
										if ( Number($(this).attr("data-tooltip-value")) == Number(rows[index]["riskrating"]) ){
											$(this).addClass("simpleriskdark");
										}
										else {
											$(this).removeClass("simpleriskdark");
										}
									});
								}
								
							} else {
								// Using risk rating
								template.find (".rk1").attr( "data-tooltip", rows[index]["riskinfo1"] );
								template.find (".rk2").attr( "data-tooltip", rows[index]["riskinfo2"] );
								template.find (".rk3").attr( "data-tooltip", rows[index]["riskinfo3"] );
								template.find (".rk4").attr( "data-tooltip", rows[index]["riskinfo4"] );
								template.find (".rk5").attr( "data-tooltip", rows[index]["riskinfo5"] );
								
								template.find (".rk1").attr( "data-tooltip-code", rows[index]["code"] );
								template.find (".rk2").attr( "data-tooltip-code", rows[index]["code"] );
								template.find (".rk3").attr( "data-tooltip-code", rows[index]["code"] );
								template.find (".rk4").attr( "data-tooltip-code", rows[index]["code"] );
								template.find (".rk5").attr( "data-tooltip-code", rows[index]["code"] );
								
								template.find (".simplerisk").remove();
								
								if ( !(rows[index]["riskrating"]==null || rows[index]["riskrating"]=="" ) ){
									template.find(".ratingitem").each(function(){
										if ( Number($(this).attr("data-tooltip-value")) == Number(rows[index]["riskrating"]) ){
											$(this).addClass("full");
										}
									});
								}
								
								
							}
							
							// Check if the risk is severe
							if ( rows[index]["riskrating"]== null || !rows[index]["riskrating"] >= 4 ) {
								template.find (".risk-title").addClass("risk-title-severe");
							}
							
							// Check if title should be in bold or not
							if (rows[index]["status"]==null || rows[index]["status"]==""){
								template.find(".risk-title").css("font-weight","Bold");
							}
							// Check if the show more button should be displayed
							if ( ! rows[index]["code"].endsWith ("_goto") ){
								template.find(".linkmore").remove();
							}
							else {
								template.find(".linkmore").click($.proxy (clickOnMore,  {'data':rows[index]} ) );
							}
							
							// Add the risk to the div
							assistant.find(".allitems").append(template);

							// Configure the tooltips to be displayed
							template.find(".tooltipped").each(function(index){
								$(this).on('mouseenter',function(e){
									assistant.find(".my-material-tooltip").text( $(this).attr("data-tooltip") )
									assistant.find(".my-material-tooltip").css({ top: $(this).offset().top + assistant.scrollTop() - 80 });
									assistant.find(".my-material-tooltip").css('opacity', '0.8');
									assistant.find(".my-material-tooltip").show();
								});
								$(this).on('mouseout', function () {
									assistant.find(".my-material-tooltip").hide();
								});
							});

							// Wire the clicks on the risk rating elements
							template.find(".tooltipped").each(function(){
								$(this).addClass( $(this).attr("data-tooltip-code") );
							});
							template.find(".tooltipped").click(clickOnRating);

						}
					} // End of dataset loop
				});

				// Handle the tooltips and clicks for risks
				
				// Hide the tooltip div
				assistant.find(".my-material-tooltip").hide();

				// Ready to show assistant
				assistant.find(".loading").hide();
			}
		});
	</script>
</head>
