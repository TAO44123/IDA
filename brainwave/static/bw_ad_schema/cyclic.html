<!DOCTYPE html
	PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>Cyclic</title>

	<script src="vis-network.min.js"></script>
	<script src="jquery.min.js"></script>
	<script src="brainwave-view.js"></script>

	<style type="text/css">
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
			background-color: transparent;
		}

		#mindmap {
			width: 100%;
			height: 100%;
		}
	</style>

	<script type="text/javascript">

		//init var
		let network = null;
		let nodes = new vis.DataSet();
		let edges = new vis.DataSet();
		let nodeMap = {};

		function documentReady() {
			addDataToMindMap();
		}

		function setupNetwork() {
			const container = document.getElementById('mindmap');
			const data = { nodes: nodes, edges: edges };
			const options = {
				nodes: {
					color: {
						// background: '#ff1919',
						// border: '#000000'
					},
					font: {
						size: 18,
						// color: '#fff'
					}
				},
				edges: {
					arrows: {
						to: { enabled: true }
					},
					width: 1,
				},
			};

			network = new vis.Network(container, data, options);
		}

		// add the data to the mindmap
		function addDataToMindMap() {

			setupNetwork();

			// Add the root
			const rootElement = $('body>ul>li').get(0);
			const rootId = $(rootElement).attr("id");
			const rootLabel = $('body>ul>li>a').text();

			// Add root node with orange color
			nodes.add({
				id: rootId,
				label: rootLabel,
				// color: { background: '#ff1919', border: '#000000' },
				font: { size: 18 }
			});

			nodeMap[rootId] = true;

			// Declare funtion that will add the rest of the nodes
			const addNode = function (element, parentId) {
				// var for current node id
				const currentId = $(element).attr("id");
				const label = $('a:eq(0)', element).text();
				const href = $('a:eq(0)', element).attr('href') || '/';

				if (!nodeMap[currentId]) {
					const isLeaf = $(element).children("ul").children("li").length == 0;

					if (!isLeaf) {
						// Add the node
						nodes.add({
							id: currentId,
							label: label,
							title: href
						});

						nodeMap[currentId] = true;
					} else {
						return;
					}
				}

				edges.add({
					id: parentId + "-" + currentId,
					from: parentId,
					to: currentId
				});

				$('>ul>li', element).each(function () {
					addNode(this, currentId);
				});
			};

			$('body>ul>li>ul>li').each(function () {
				addNode(this, rootId);
			});

			// Hide the list ul
			$('body>ul').hide();
		}

		$(window).ready(function () {
			$('body').bwViewResolve(documentReady);
			$('body').css('background-color', 'transparent');
		});

	</script>

</head>

<body id="content">
	<div id="mindmap"></div>

	<div class="brainwave-view" id="ws/js/bw_ad_schema/analytics/analytics_group_cyclic/findLoops" paramlist="rootuid"
		format="ultree" parentkey="parent_uid" key="uid" value="displayname" rootkey="rootuid"></div>
</body>

</html>
