		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>browsertimestamp</title>
		<script src="bw_pages.js"></script>
		<script src="moment.min.js"></script>
		<script type="text/javascript" >
			Pages.listenInitDone(function() {
				var myMoment = moment();
				var stamp = myMoment.format("YYYYMMDDHHmmss.000ZZ"); //Full LDAP format
				//document.body.innerHTML = stamp;
				Pages.sendEvent('localtimestampfound',{timestamp:stamp});
			});
		</script>
