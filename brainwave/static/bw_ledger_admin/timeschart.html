<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Chart</title>

    <!-- Load required libraries -->
    <script src="jquery.min.js"></script>
    <script src="chart.umd.js"></script>
    <script src="chartjs-plugin-annotation.min.js"></script>
    <script type="text/javascript">

        // Convert milliseconds to formatted time string (HH:MM:SS)
        function msToTime(duration) {
            var milliseconds = Math.floor((duration % 1000) / 100),
                seconds = Math.floor((duration / 1000) % 60),
                minutes = Math.floor((duration / (1000 * 60)) % 60),
                hours = Math.floor((duration / (1000 * 60 * 60)) % 24);

            hours = (hours < 10) ? "0" + hours : hours;
            minutes = (minutes < 10) ? "0" + minutes : minutes;
            seconds = (seconds < 10) ? "0" + seconds : seconds;

            return hours + ":" + minutes + ":" + seconds;
        }

        // Get URL parameter by name
        $.getUrlParameter = function (paramname) {
            var pageUrl = window.location.search.substring(1);
            var urlVars = pageUrl.split('&');
            var currentParamName = null;

            for (var i = 0; i < urlVars.length; i++) {
                splitted = urlVars[i].split('=');
                currentParamName = splitted[0];
                currentParamValue = splitted[1];

                if (currentParamName == paramname) {
                    return currentParamValue;
                }
            }
        }

        $(document).ready(function () {
            $("body").css("overflow", "hidden");

            var input = decodeURIComponent($.getUrlParameter("data"));
            var data = jQuery.parseJSON(input);
            var list = data["data"];
            var labels = [];
            var chartData = [];

            jQuery.ajaxSetup({ async: false });

            // Fetch timeslot names and times
            for (var i = list.length - 1; i >= 0; i--) {
                requestPath = "../../../ws/results/timeslot_timing";

                jQuery.getJSON(requestPath, { uid: list[i]["uid"] }).done(
                    function (result) {
                        var displayName = result.data[0].ts_displayname;
                        labels.push(displayName);
                    }
                );
                var timeValue = list[i]["time"];
                chartData.push(timeValue);
            }

            // Calculate average of time values
            function average(data) {
                if (data.length === 0) return 0;

                let sum = 0;
                for (let i = 0; i < data.length; i++) {
                    // Convert to number if it's a string
                    const value = typeof data[i] === 'string' ? parseInt(data[i]) : data[i];
                    sum += value;
                }

                return sum / data.length;
            }

            const averageValue = average(chartData);

            const ctx = document.getElementById('chart').getContext('2d');
            const myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: chartData,
                        color: '#ffffff',
                        borderColor: '#4072bd',
                        borderWidth: 2,
                        tension: 0.3,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            display: false
                        },
                        // Format tooltip to show time in HH:MM:SS
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return msToTime(context.parsed.y);
                                }
                            }
                        },
                        // Add horizontal line for average value
                        annotation: {
                            annotations: {
                                line1: {
                                    type: 'line',
                                    yMin: averageValue,
                                    yMax: averageValue,
                                    borderColor: 'black',
                                    borderWidth: 0.5,
                                    label: {
                                        display: true,
                                        content: 'Average: ' + msToTime(averageValue),
                                        position: 'end',
                                    }
                                }
                            }
                        }
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                    // Hide axis ticks for cleaner appearance
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                display: false
                            }
                        },
                        x: {
                            ticks: {
                                display: false
                            }
                        }
                    }
                }
            });
        });
    </script>

</head>

<body>
    <canvas id="chart" style="width: 100%; height: 100%;"></canvas>
</body>

</html>
